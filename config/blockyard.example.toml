# Example Blockyard node configuration.
#
# Copy to /etc/blockyard/config.toml and adjust for your environment.

[node]
# name = "node-a"                        # Defaults to hostname
listen = "0.0.0.0:7400"                  # Client + cluster port
data_listen = "0.0.0.0:7401"             # Bulk data transfer port
metrics_listen = "0.0.0.0:7402"          # Prometheus /metrics endpoint

[cluster]
seeds = ["10.0.1.1:7400", "10.0.1.2:7400"]

[storage]
# Single pool (backward compatible):
# zfs_pool = "blockyard"

# Multiple pools:
zfs_pools = ["blockyard-ssd", "blockyard-hdd"]
extent_size = "4MB"                      # Extent size (unit of replication)

[raft]
heartbeat_interval = "200ms"
election_timeout_min = "1000ms"
election_timeout_max = "2000ms"
snapshot_interval = 10000                # Log entries between snapshots

[gossip]
probe_interval = "500ms"                 # SWIM health probe interval
suspect_timeout = "3s"                   # Time before suspect -> failed
probe_timeout = "200ms"                  # Individual probe timeout

[rebalance]
enabled = true
threshold = 0.20                         # Capacity deviation trigger (20%)
max_concurrent = 1                       # Concurrent volume moves per node
throttle_bandwidth = "1Gbps"

# Uncomment to enable mutual TLS:
# [tls]
# ca_cert = "/etc/blockyard/ca.pem"
# cert = "/etc/blockyard/node.pem"
# key = "/etc/blockyard/node-key.pem"

[tags]
# Arbitrary key-value tags for affinity/placement rules
# storage_class = "ssd"
# rack = "rack-1"
# region = "us-east"
