syntax = "proto3";

package blockyard;

// ---------------------------------------------------------------------------
// Raft RPCs — one call per Raft group.
// Every message is scoped to a (group_id, from_node, to_node) triple so
// a single TCP connection can multiplex all groups between a node pair.
// ---------------------------------------------------------------------------

service RaftService {
  // Append log entries (or act as heartbeat when entries is empty).
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);

  // Install a full state-machine snapshot to a lagging follower.
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);

  // Pre-vote or vote request during leader election.
  rpc RequestVote(VoteRequest) returns (VoteResponse);
}

// ---------------------------------------------------------------------------
// Heartbeat consolidation — one message per node pair covering *all* shared
// Raft groups, dramatically reducing cross-node traffic.
// ---------------------------------------------------------------------------

service HeartbeatService {
  rpc ConsolidatedHeartbeat(ConsolidatedHeartbeatRequest)
      returns (ConsolidatedHeartbeatResponse);
}

// ---------------------------------------------------------------------------
// Client-to-cluster RPCs: proposal forwarding and state queries.
// ---------------------------------------------------------------------------

service ClusterService {
  // Forward a write/mutation to the current leader of a Raft group.
  rpc ForwardProposal(ForwardProposalRequest)
      returns (ForwardProposalResponse);

  // Query the committed state machine of a Raft group.
  rpc GetState(GetStateRequest) returns (GetStateResponse);
}

// ===== Raft messages ======================================================

message LogEntry {
  uint64 term   = 1;
  uint64 index  = 2;
  bytes  data   = 3; // serde_json-encoded RaftRequest
}

message AppendEntriesRequest {
  uint64 group_id       = 1;
  uint64 leader_id      = 2;
  uint64 term           = 3;
  uint64 prev_log_index = 4;
  uint64 prev_log_term  = 5;
  uint64 leader_commit  = 6;
  repeated LogEntry entries = 7;
}

message AppendEntriesResponse {
  uint64 term    = 1;
  bool   success = 2;
  // Hint: the follower's last log index so the leader can jump back faster.
  uint64 last_log_index = 3;
}

message InstallSnapshotRequest {
  uint64 group_id           = 1;
  uint64 leader_id          = 2;
  uint64 term               = 3;
  uint64 last_included_index = 4;
  uint64 last_included_term  = 5;
  bytes  data               = 6; // full serialized snapshot
}

message InstallSnapshotResponse {
  uint64 term = 1;
}

message VoteRequest {
  uint64 group_id      = 1;
  uint64 candidate_id  = 2;
  uint64 term          = 3;
  uint64 last_log_index = 4;
  uint64 last_log_term  = 5;
  // true  → this is a pre-vote (does not increment term on receiver)
  bool   pre_vote      = 6;
}

message VoteResponse {
  uint64 term         = 1;
  bool   vote_granted = 2;
}

// ===== Heartbeat messages =================================================

message GroupHeartbeat {
  uint64 group_id     = 1;
  uint64 term         = 2;
  uint64 commit_index = 3;
}

message ConsolidatedHeartbeatRequest {
  uint64 from_node = 1;
  uint64 to_node   = 2;
  repeated GroupHeartbeat heartbeats = 3;
}

message ConsolidatedHeartbeatResponse {
  bool   success = 1;
  string message = 2;
}

// ===== Cluster messages ===================================================

message ForwardProposalRequest {
  uint64 group_id = 1;
  bytes  payload  = 2; // serde_json-encoded RaftRequest
}

message ForwardProposalResponse {
  bool   success = 1;
  string error   = 2;
  bytes  data    = 3; // optional response payload
}

message GetStateRequest {
  uint64 group_id = 1;
}

message GetStateResponse {
  bool   success = 1;
  string error   = 2;
  bytes  state   = 3; // serde_json-encoded AppState
}
